<div mat-dialog-content class="container">
    <h2 mat-dialog-title class="title">{{ data ? 'Editar tarefa' : 'Nova tarefa' }}</h2>

    <mat-form-field appearance="outline">
        <mat-label>Título</mat-label>
        <input matInput [(ngModel)]="task.title">
    </mat-form-field>

    <mat-form-field appearance="outline">
        <mat-label>Descrição</mat-label>
        <textarea matInput rows="4" [(ngModel)]="task.description"></textarea>
    </mat-form-field>

    <mat-form-field appearance="outline">
        <mat-label>Status</mat-label>
        <mat-select [(ngModel)]="task.status">
            <mat-option value="todo">A fazer</mat-option>
            <mat-option value="doing">Fazendo</mat-option>
            <mat-option value="done">Feito</mat-option>
        </mat-select>
    </mat-form-field>
</div>

<div mat-dialog-actions align="center">
    <button mat-raised-button color="primary" (click)="salvar()">Salvar</button>
</div>
