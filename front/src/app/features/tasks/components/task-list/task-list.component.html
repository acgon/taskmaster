<div class="container">
  <h3 [ngClass]="'title-' + status">{{ titulo }}</h3>
  @if (filteredTasks.length !== 0) {
    <ul>
      @for (task of filteredTasks; track task.id) {
        <app-task [task]="task" (delete)="apagarTarefa($event)"></app-task>
      }
    </ul>
  } @else  {
    <p>(Sem tarefas no momento.)</p>
  }
</div>
